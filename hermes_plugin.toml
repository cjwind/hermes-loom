# Hermes Loom plugin manifest.
#
# Hermes plugin loaders vary by version; this manifest declares the canonical
# entrypoint so `hermes plugins install .` (or an equivalent loader) can find it.
# The entrypoint is a function `register(ctx)` that binds hooks defensively —
# it works even if a given hook point is absent (it degrades to the snapshot /
# state.db fallbacks). See README "Install the plugin".

name = "hermes-loom"
version = "0.1.0"
description = "Growth observability & tuning sidecar: ledger of memory/skill changes + provenance + manual tuning."
entrypoint = "hermes_loom.plugin:register"

# Hooks the plugin attempts to bind (it tries several aliases per point and
# skips any the running Hermes does not expose).
[hooks]
memory_write = "binds memory add/replace/remove -> growth ledger"
tool_post    = "catches skill_create/edit/patch/delete tool results"
session_start = "runs snapshot-diff + state.db ingest fallback"

[tools]
loom_sync = "Reconcile the Loom growth ledger with current memory/skills."
